name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Enforce version bump for source changes
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED_FILES="$(git diff --name-only "$BASE_SHA...$HEAD_SHA")"

          echo "Changed files:"
          echo "$CHANGED_FILES"

          SRC_CHANGED="false"

          while IFS= read -r file; do
            if [[ "$file" == src/* ]]; then
              SRC_CHANGED="true"
            fi
          done <<< "$CHANGED_FILES"

          if [[ "$SRC_CHANGED" == "true" ]]; then
            BASE_VERSION="$(git show "$BASE_SHA:package.json" | node -e 'let s="";process.stdin.on("data",d=>s+=d);process.stdin.on("end",()=>process.stdout.write(JSON.parse(s).version));')"
            HEAD_VERSION="$(node -e "process.stdout.write(require('./package.json').version)")"

            echo "Base version: $BASE_VERSION"
            echo "Head version: $HEAD_VERSION"

            if [[ "$BASE_VERSION" == "$HEAD_VERSION" ]]; then
              echo "Source files changed but package version was not bumped."
              echo "Please update package.json version before merging to main."
              exit 1
            fi
          fi

          echo "Version bump guard passed."

      - name: Run project checks
        run: pnpm run check

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check if version already published
        id: version_check
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version ${PACKAGE_VERSION} is already on npm. Skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version ${PACKAGE_VERSION} is new. Publishing."
          fi

      - name: Publish package
        if: steps.version_check.outputs.exists == 'false'
        run: pnpm publish --no-git-checks --provenance
